{% extends "base.html" %}
{% block title %}Masuk · SANTUY{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card">
    <h1>Masuk</h1>
    <p class="muted">Belum punya akun? <a href="{{ url_for('daftar') }}">Daftar di sini</a>.</p>
    <form method="post" class="form">
      <label>Email
        <input type="email" name="email" required placeholder="nama@email.com">
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button class="btn block" type="submit">Masuk</button>
    </form>
  </div>
</div>
{% endblock %}
